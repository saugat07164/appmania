    <script>
        // Add this JavaScript at the end of your HTML body or in a separate file
function sb_open() {
    var element = document.getElementById("gridhandler");

// Update multiple CSS properties
    element.style.gridTemplateAreas = "centerdiv sidebar"; // Note the camelCase 
    element.style.gridTemplateColumns = "auto 17%"; 

    document.getElementById("mySidebar").style.display = "block";
    document.getElementById("openNav").style.display = "none";
 
}

function sb_close() {
    var element = document.getElementById("gridhandler");

// Update multiple CSS properties
    element.style.gridTemplateAreas = "centerdiv"; // Note the camelCase 
    element.style.gridTemplateColumns = "auto"; 

// You can continue setting other properties as well
    document.getElementById("mySidebar").style.display = "none";
    document.getElementById("openNav").style.display = "block";
   
}

    </script>
